<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GBS Admin</title>
<link rel="icon" type="image/png" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Be Vietnam Pro', sans-serif;
    background: #0a0a0a;
    color: #e0e0e0;
    min-height: 100vh;
  }

  .login-screen {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 20px;
  }

  .login-box { width: 100%; max-width: 360px; text-align: center; }
  .login-box h1 { font-size: 20px; font-weight: 700; margin-bottom: 6px; color: #fff; }
  .login-box p { font-size: 12px; color: #555; margin-bottom: 24px; }

  .login-box input {
    width: 100%; padding: 12px 14px; background: #141414;
    border: 1px solid #252525; border-radius: 6px; color: #e0e0e0;
    font-family: inherit; font-size: 14px; outline: none;
    margin-bottom: 12px; transition: border-color 0.2s;
  }

  .login-box input:focus { border-color: #1d9bf0; }
  .login-box .error { font-size: 12px; color: #f04040; margin-bottom: 12px; display: none; }

  .btn {
    padding: 10px 20px; border: none; border-radius: 6px;
    font-family: inherit; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: all 0.15s;
  }

  .btn-primary { background: #1d9bf0; color: #fff; width: 100%; padding: 12px; }
  .btn-primary:hover { background: #1a8cd8; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-secondary { background: #1a1a1a; border: 1px solid #252525; color: #aaa; }
  .btn-secondary:hover { background: #222; color: #e0e0e0; }
  .btn-danger { background: #2a1515; border: 1px solid #3a2020; color: #f04040; }
  .btn-danger:hover { background: #3a1a1a; }
  .btn-small { padding: 6px 12px; font-size: 12px; }

  .admin { display: none; max-width: 700px; margin: 0 auto; padding: 0 16px 40px; }
  .admin.active { display: block; }

  .admin-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 0; border-bottom: 1px solid #1a1a1a; margin-bottom: 20px;
    position: sticky; top: 0; background: #0a0a0a; z-index: 10;
  }

  .admin-header h1 { font-size: 16px; font-weight: 700; color: #fff; }
  .admin-header .logout { font-size: 12px; color: #555; cursor: pointer; background: none; border: none; font-family: inherit; }
  .admin-header .logout:hover { color: #f04040; }

  .chapter-card {
    background: #111; border: 1px solid #1a1a1a; border-radius: 8px;
    padding: 14px; margin-bottom: 10px; display: flex; align-items: center;
    gap: 14px; transition: border-color 0.15s;
  }

  .chapter-card:hover { border-color: #252525; }
  .card-order { font-size: 12px; font-weight: 700; color: #333; min-width: 28px; text-align: center; }

  .card-thumb {
    width: 48px; height: 48px; border-radius: 4px; background: #1a1a1a;
    flex-shrink: 0; overflow: hidden; display: flex; align-items: center; justify-content: center;
  }

  .card-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .card-info { flex: 1; min-width: 0; }
  .card-title { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
  .card-meta { font-size: 11px; color: #555; }
  .card-actions { display: flex; gap: 6px; flex-shrink: 0; }

  .editor { display: none; max-width: 700px; margin: 0 auto; padding: 0 16px 40px; }
  .editor.active { display: block; }

  .editor-header {
    display: flex; align-items: center; gap: 12px; padding: 16px 0;
    border-bottom: 1px solid #1a1a1a; margin-bottom: 20px;
    position: sticky; top: 0; background: #0a0a0a; z-index: 10;
  }

  .editor-header h2 { font-size: 16px; font-weight: 700; flex: 1; }

  .form-group { margin-bottom: 20px; }
  .form-group label { display: block; font-size: 12px; font-weight: 600; color: #888; margin-bottom: 8px; }

  .form-group input {
    width: 100%; padding: 10px 12px; background: #141414;
    border: 1px solid #252525; border-radius: 6px; color: #e0e0e0;
    font-family: inherit; font-size: 13px; outline: none;
  }

  .form-group input:focus { border-color: #1d9bf0; }

  .dropzone {
    border: 2px dashed #252525; border-radius: 8px; padding: 40px 20px;
    text-align: center; cursor: pointer; transition: all 0.2s; position: relative;
  }

  .dropzone:hover, .dropzone.dragover { border-color: #1d9bf0; background: #0d1520; }
  .dropzone p { font-size: 13px; color: #555; }
  .dropzone .hint { font-size: 11px; color: #333; margin-top: 6px; }
  .dropzone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

  .image-list { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }

  .image-item {
    display: flex; align-items: center; gap: 10px; background: #111;
    border: 1px solid #1a1a1a; border-radius: 6px; padding: 8px 10px;
  }

  .image-item .img-preview { width: 40px; height: 40px; border-radius: 4px; object-fit: cover; flex-shrink: 0; }
  .image-item .img-name { flex: 1; font-size: 12px; color: #888; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .image-item .img-order { font-size: 11px; font-weight: 700; color: #333; min-width: 20px; text-align: center; }
  .image-item .img-remove { background: none; border: none; color: #444; cursor: pointer; font-size: 14px; padding: 2px 6px; }
  .image-item .img-remove:hover { color: #f04040; }

  .progress-info { margin-top: 10px; font-size: 12px; color: #888; display: none; }
  .progress-bar { height: 3px; background: #1a1a1a; border-radius: 2px; overflow: hidden; margin-top: 4px; display: none; }
  .progress-bar .fill { height: 100%; background: #1d9bf0; width: 0%; transition: width 0.3s; }

  .status {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    padding: 10px 20px; border-radius: 8px; font-size: 13px; font-weight: 500;
    z-index: 100; display: none; animation: fadeIn 0.2s;
  }

  .status.success { background: #0d2818; border: 1px solid #1a4028; color: #4ade80; }
  .status.error { background: #2a0d0d; border: 1px solid #401a1a; color: #f04040; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateX(-50%) translateY(10px); }
    to { opacity: 1; transform: translateX(-50%) translateY(0); }
  }

  .loading { text-align: center; padding: 40px; color: #333; font-size: 13px; }
  .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid #252525; border-top-color: #1d9bf0; border-radius: 50%; animation: spin 0.6s linear infinite; margin-bottom: 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .empty-state { text-align: center; padding: 60px 20px; color: #333; }
  .empty-state p { font-size: 14px; margin-bottom: 16px; }

  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    z-index: 50; display: none; align-items: center; justify-content: center; padding: 20px;
  }

  .overlay.active { display: flex; }

  .dialog {
    background: #141414; border: 1px solid #252525; border-radius: 10px;
    padding: 24px; max-width: 340px; width: 100%; text-align: center;
  }

  .dialog h3 { font-size: 15px; font-weight: 600; margin-bottom: 8px; }
  .dialog p { font-size: 13px; color: #777; margin-bottom: 20px; }
  .dialog .dialog-actions { display: flex; gap: 8px; }
  .dialog .dialog-actions .btn { flex: 1; }
</style>
</head>
<body>

<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <h1>🦈 GBS Admin</h1>
    <p>Great Blue Shark — Quản lý chương</p>
    <input type="password" id="passwordInput" placeholder="Mật khẩu" autofocus>
    <div class="error" id="loginError">Sai mật khẩu.</div>
    <button class="btn btn-primary" onclick="login()">Đăng nhập</button>
  </div>
</div>

<div class="admin" id="adminPanel">
  <div class="admin-header">
    <h1>🦈 GBS Admin</h1>
    <button class="logout" onclick="logout()">Đăng xuất</button>
  </div>
  <button class="btn btn-primary" style="width:100%;margin-bottom:20px;" onclick="openEditor()">+ Thêm chương mới</button>
  <div id="chapterListAdmin">
    <div class="loading"><div class="spinner"></div><br>Đang tải...</div>
  </div>
</div>

<div class="editor" id="editorPanel">
  <div class="editor-header">
    <button class="btn btn-secondary btn-small" onclick="closeEditor()">← Quay lại</button>
    <h2 id="editorTitle">Thêm chương mới</h2>
  </div>
  <div class="form-group">
    <label>Tên chương</label>
    <input type="text" id="chapterTitle" placeholder="VD: GBS#006">
  </div>
  <div class="form-group">
    <label>Ảnh chương</label>
    <div class="dropzone" id="dropzone">
      <p>Kéo thả ảnh vào đây hoặc bấm để chọn</p>
      <div class="hint">PNG, JPG, WEBP — Nhiều ảnh cùng lúc</div>
      <input type="file" id="fileInput" multiple accept="image/*">
    </div>
    <div class="progress-info" id="progressInfo">Đang upload...</div>
    <div class="progress-bar" id="progressBar"><div class="fill" id="progressFill"></div></div>
    <div class="image-list" id="imageList"></div>
  </div>
  <button class="btn btn-primary" style="width:100%;" id="saveBtn" onclick="saveChapter()">Lưu chương</button>
</div>

<div class="overlay" id="confirmOverlay">
  <div class="dialog">
    <h3 id="confirmTitle">Xác nhận</h3>
    <p id="confirmMsg">Bạn chắc chắn?</p>
    <div class="dialog-actions">
      <button class="btn btn-secondary" onclick="closeConfirm()">Hủy</button>
      <button class="btn btn-danger" id="confirmBtn">Xóa</button>
    </div>
  </div>
</div>

<div class="status" id="statusToast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-app.js";
  import { getFirestore, collection, doc, getDocs, setDoc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyC1mFu5jwgmszDa7bKCaj89BAECxW-6HEQ",
    authDomain: "great-blue-shark.firebaseapp.com",
    projectId: "great-blue-shark",
    storageBucket: "great-blue-shark.firebasestorage.app",
    messagingSenderId: "848130301351",
    appId: "1:848130301351:web:4c063bcd97a0f238e42a82",
    measurementId: "G-TTVKGE6G8C"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const GH_TOKEN = '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';
  const GH_OWNER = 'ditmeplaystore';
  const GH_REPO = 'great-blue-shark';
  const GH_BRANCH = 'main';
  const ADMIN_PASS = 'makocain';

  let chapters = [];
  let editingId = null;
  let pendingImages = [];

  // ── AUTH ──
  window.login = function() {
    if (document.getElementById('passwordInput').value === ADMIN_PASS) {
      sessionStorage.setItem('gbs_admin', '1');
      showAdmin();
    } else {
      document.getElementById('loginError').style.display = 'block';
      document.getElementById('passwordInput').style.borderColor = '#f04040';
    }
  };

  document.getElementById('passwordInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') window.login();
  });

  window.logout = function() { sessionStorage.removeItem('gbs_admin'); location.reload(); };

  function showAdmin() {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminPanel').classList.add('active');
    loadChapters();
  }

  // ── LOAD ──
  async function loadChapters() {
    try {
      const q = query(collection(db, 'chapters'), orderBy('order', 'asc'));
      const snapshot = await getDocs(q);
      chapters = [];
      snapshot.forEach((d) => { chapters.push({ id: d.id, ...d.data() }); });
      renderChapterList();
    } catch(e) {
      document.getElementById('chapterListAdmin').innerHTML = '<div class="empty-state"><p>Lỗi tải dữ liệu. Kiểm tra Firestore rules.</p></div>';
    }
  }

  function renderChapterList() {
    const container = document.getElementById('chapterListAdmin');
    if (chapters.length === 0) {
      container.innerHTML = '<div class="empty-state"><p>Chưa có chương nào.</p></div>';
      return;
    }
    container.innerHTML = chapters.map((ch, i) => {
      const thumbUrl = ch.images && ch.images.length > 0 ? ch.images[0] : '';
      const imgCount = ch.images ? ch.images.length : 0;
      return `<div class="chapter-card">
        <div class="card-order">#${i + 1}</div>
        <div class="card-thumb">${thumbUrl ? `<img src="${thumbUrl}">` : '<span style="font-size:11px;color:#333;">—</span>'}</div>
        <div class="card-info">
          <div class="card-title">${ch.title || 'Chương ' + (i+1)}</div>
          <div class="card-meta">${imgCount} ảnh</div>
        </div>
        <div class="card-actions">
          <button class="btn btn-secondary btn-small" onclick="editChapter('${ch.id}')">Sửa</button>
          <button class="btn btn-danger btn-small" onclick="confirmDelete('${ch.id}', '${(ch.title||'').replace(/'/g,"\\'")}')">Xóa</button>
        </div>
      </div>`;
    }).join('');
  }

  // ── EDITOR ──
  window.openEditor = function(id) {
    editingId = id || null;
    pendingImages = [];
    document.getElementById('chapterTitle').value = '';
    document.getElementById('imageList').innerHTML = '';
    document.getElementById('progressBar').style.display = 'none';
    document.getElementById('progressInfo').style.display = 'none';

    if (editingId) {
      const ch = chapters.find(c => c.id === editingId);
      if (ch) {
        document.getElementById('editorTitle').textContent = 'Sửa: ' + ch.title;
        document.getElementById('chapterTitle').value = ch.title || '';
        if (ch.images && ch.images.length > 0) {
          pendingImages = ch.images.map(url => ({ url, preview: url, file: null }));
          renderImageList();
        }
      }
    } else {
      document.getElementById('editorTitle').textContent = 'Thêm chương mới';
    }

    document.getElementById('adminPanel').classList.remove('active');
    document.getElementById('editorPanel').classList.add('active');
  };

  window.closeEditor = function() {
    document.getElementById('editorPanel').classList.remove('active');
    document.getElementById('adminPanel').classList.add('active');
    editingId = null;
    pendingImages = [];
  };

  window.editChapter = function(id) { window.openEditor(id); };

  // ── FILES ──
  const fileInput = document.getElementById('fileInput');
  const dropzone = document.getElementById('dropzone');

  fileInput.addEventListener('change', (e) => { handleFiles(e.target.files); fileInput.value = ''; });
  dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.classList.add('dragover'); });
  dropzone.addEventListener('dragleave', () => { dropzone.classList.remove('dragover'); });
  dropzone.addEventListener('drop', (e) => { e.preventDefault(); dropzone.classList.remove('dragover'); handleFiles(e.dataTransfer.files); });

  function handleFiles(files) {
    for (const file of files) {
      if (!file.type.startsWith('image/')) continue;
      pendingImages.push({ file, preview: URL.createObjectURL(file), url: null });
    }
    renderImageList();
  }

  function renderImageList() {
    document.getElementById('imageList').innerHTML = pendingImages.map((img, i) => `
      <div class="image-item">
        <div class="img-order">${i + 1}</div>
        <img class="img-preview" src="${img.preview}">
        <div class="img-name">${img.file ? img.file.name : 'Ảnh đã upload'}</div>
        <button class="img-remove" onclick="removeImage(${i})">✕</button>
      </div>
    `).join('');
  }

  window.removeImage = function(i) { pendingImages.splice(i, 1); renderImageList(); };

  // ── GITHUB UPLOAD ──
  async function uploadToGitHub(file, path) {
    const base64 = await new Promise((res, rej) => {
      const r = new FileReader();
      r.onload = () => res(r.result.split(',')[1]);
      r.onerror = rej;
      r.readAsDataURL(file);
    });

    let sha = null;
    try {
      const check = await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${path}`, {
        headers: { 'Authorization': `token ${GH_TOKEN}` }
      });
      if (check.ok) sha = (await check.json()).sha;
    } catch(e) {}

    const body = { message: `Upload: ${path}`, content: base64, branch: GH_BRANCH };
    if (sha) body.sha = sha;

    const res = await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${path}`, {
      method: 'PUT',
      headers: { 'Authorization': `token ${GH_TOKEN}`, 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });

    if (!res.ok) throw new Error((await res.json()).message || 'Upload thất bại');
    return (await res.json()).content.download_url;
  }

  // ── SAVE ──
  window.saveChapter = async function() {
    const title = document.getElementById('chapterTitle').value.trim();
    if (!title) { showStatus('Nhập tên chương.', 'error'); return; }
    if (pendingImages.length === 0) { showStatus('Thêm ít nhất 1 ảnh.', 'error'); return; }

    const saveBtn = document.getElementById('saveBtn');
    saveBtn.disabled = true;
    saveBtn.textContent = 'Đang lưu...';

    const progressBar = document.getElementById('progressBar');
    const progressFill = document.getElementById('progressFill');
    const progressInfo = document.getElementById('progressInfo');

    try {
      const toUpload = pendingImages.filter(img => img.file);
      const chapterId = editingId || ('ch_' + Date.now());
      const folderName = title.replace(/[^a-zA-Z0-9#]/g, '_');

      if (toUpload.length > 0) {
        progressBar.style.display = 'block';
        progressInfo.style.display = 'block';
      }

      let uploaded = 0;
      for (const img of pendingImages) {
        if (img.file) {
          const ext = img.file.name.split('.').pop();
          const fileName = `${String(uploaded + 1).padStart(3,'0')}_${Date.now()}.${ext}`;
          const path = `chapters/${folderName}/${fileName}`;

          progressInfo.textContent = `Đang upload ${uploaded + 1}/${toUpload.length}...`;
          img.url = await uploadToGitHub(img.file, path);
          uploaded++;
          progressFill.style.width = ((uploaded / toUpload.length) * 100) + '%';
        }
      }

      const chapterData = {
        title,
        images: pendingImages.map(img => img.url).filter(Boolean),
        order: editingId && chapters.find(c => c.id === editingId)
          ? chapters.find(c => c.id === editingId).order
          : chapters.length + 1,
        updatedAt: Date.now()
      };

      await setDoc(doc(db, 'chapters', chapterId), chapterData);

      progressBar.style.display = 'none';
      progressInfo.style.display = 'none';
      progressFill.style.width = '0%';

      showStatus('Đã lưu ' + title + '!', 'success');
      await loadChapters();
      window.closeEditor();
    } catch(e) {
      console.error('Lỗi:', e);
      showStatus('Lỗi: ' + e.message, 'error');
    }

    saveBtn.disabled = false;
    saveBtn.textContent = 'Lưu chương';
  };

  // ── DELETE ──
  window.confirmDelete = function(id, title) {
    document.getElementById('confirmTitle').textContent = 'Xóa chương?';
    document.getElementById('confirmMsg').textContent = 'Xóa "' + title + '"? Ảnh trên GitHub sẽ vẫn còn.';
    document.getElementById('confirmBtn').onclick = () => deleteChapter(id);
    document.getElementById('confirmOverlay').classList.add('active');
  };

  window.closeConfirm = function() { document.getElementById('confirmOverlay').classList.remove('active'); };

  async function deleteChapter(id) {
    window.closeConfirm();
    try {
      await deleteDoc(doc(db, 'chapters', id));
      await loadChapters();
      for (let i = 0; i < chapters.length; i++) {
        chapters[i].order = i + 1;
        await setDoc(doc(db, 'chapters', chapters[i].id), chapters[i]);
      }
      await loadChapters();
      showStatus('Đã xóa.', 'success');
    } catch(e) {
      showStatus('Lỗi xóa: ' + e.message, 'error');
    }
  }

  function showStatus(msg, type) {
    const t = document.getElementById('statusToast');
    t.textContent = msg;
    t.className = 'status ' + type;
    t.style.display = 'block';
    setTimeout(() => { t.style.display = 'none'; }, 3000);
  }

  if (sessionStorage.getItem('gbs_admin') === '1') showAdmin();
</script>
</body>
</html>
