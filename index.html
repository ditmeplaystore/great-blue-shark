<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fast-track Fortune Formula</title>

<meta property="og:image" content="https://ditmeplaystore.github.io/FasttrackFortuneFormula/2d2d4163153d10c444cea8b4ddb6ae99.jpg">

<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&family=Lilita+One&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Be Vietnam Pro', sans-serif;
    background: #060d18;
    color: #c8dce8;
    min-height: 100vh;
    max-width: 1080px;
    margin: 0 auto;
  }

  /* ── BANNER ── */
  .hero-banner {
    position: relative;
    width: 100%;
    height: 150px;
    overflow: hidden;
  }

  .hero-banner > img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    display: block;
  }

  .hero-banner .mascot {
    position: absolute;
    height: 90px;
    width: auto;
    bottom: 18px;
    left: 0;
    z-index: 2;
    pointer-events: none;
    will-change: transform;
    animation: mascotSwim 18s linear infinite;
  }

  @keyframes mascotSwim {
    0%   { transform: translateX(calc(1080px + 200px)) translateY(0); }
    25%  { transform: translateX(calc(810px + 150px)) translateY(-8px); }
    50%  { transform: translateX(calc(540px + 100px)) translateY(0); }
    75%  { transform: translateX(calc(270px + 50px)) translateY(-8px); }
    100% { transform: translateX(-200px) translateY(0); }
  }

  .hero-banner::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 60%;
    background: linear-gradient(to top, #060d18 0%, #060d18ee 30%, #060d1880 60%, transparent 100%);
    z-index: 1;
    pointer-events: none;
  }


  .series-info {
    padding: 12px 20px 16px;
    border-bottom: 1px solid #0f2040;
  }

  .series-info h1 {
    font-family: 'Lilita One', sans-serif;
    font-size: 36px;
    font-weight: 400;
    margin-bottom: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* ── CHAPTER HEADER ── */
  .chapter-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 20px;
  }

  .chapter-header span {
    font-size: 14px;
    font-weight: 600;
    color: #8ab0cc;
  }

  .sort-btn {
    background: none;
    border: none;
    color: #3a5a7a;
    cursor: pointer;
    padding: 4px;
    font-size: 18px;
  }

  /* ── CHAPTER LIST ── */
  .chapter-list {
    list-style: none;
  }

  .chapter-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 20px;
    cursor: pointer;
    transition: background 0.15s;
    border-bottom: 1px solid #081420;
    text-decoration: none;
    color: inherit;
  }

  .chapter-item:hover {
    background: #081420;
  }

  .chapter-item.read {
    opacity: 0.5;
  }

  .chap-thumb {
    width: 64px;
    height: 64px;
    border-radius: 4px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    color: #4a6a8a;
    overflow: hidden;
  }

  .chap-info {
    flex: 1;
    min-width: 0;
  }

  .chap-title {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .chap-meta {
    font-size: 11px;
    color: #4a6a8a;
    display: flex;
    gap: 10px;
  }

  .chap-desc {
    font-size: 12px;
    color: #3a5a7a;
    margin-bottom: 4px;
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .episodes-panel {
    display: none;
  }
  .episodes-panel.active {
    display: block;
  }

  /* ── READER VIEW ── */
  .reader {
    display: none;
    min-height: 100vh;
  }

  .reader.active {
    display: block;
  }

  .reader-nav {
    position: sticky;
    top: 0;
    background: #060d18;
    border-bottom: 1px solid #0f2040;
    display: flex;
    align-items: center;
    padding: 12px 16px;
    gap: 12px;
    z-index: 10;
  }

  .back-btn {
    background: none;
    border: none;
    color: #8ab0cc;
    font-size: 20px;
    cursor: pointer;
    padding: 4px;
  }

  .reader-title {
    font-size: 14px;
    font-weight: 600;
    flex: 1;
  }

  .reader-content {
    padding: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    background: #040a14;
    min-height: 60vh;
  }

  /* Chặn user-friendly cách tải ảnh: select, drag, long-press menu */
  .reader-content img {
    -webkit-user-select: none;
    -moz-user-select: none;
    -ms-user-select: none;
    user-select: none;
    -webkit-user-drag: none;
    -khtml-user-drag: none;
    -moz-user-drag: none;
    -o-user-drag: none;
    user-drag: none;
    pointer-events: none;
    -webkit-touch-callout: none;
  }

  .reader-content .img-wrapper {
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
  }

  .reader-placeholder {
    padding: 60px 20px;
    text-align: center;
    color: #1a3a5a;
    font-size: 13px;
    line-height: 1.8;
  }

  .reader-bottom {
    padding: 20px;
    display: flex;
    gap: 10px;
  }

  .reader-bottom button {
    flex: 1;
    padding: 12px;
    background: #0a1628;
    border: 1px solid #122a4a;
    color: #8ab0cc;
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .reader-bottom button:hover {
    background: #222;
    color: #c8dce8;
  }

  .reader-bottom button:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  /* ── MAIN VIEW TOGGLE ── */
  .main-view {
    display: block;
  }

  .main-view.hidden {
    display: none;
  }

  /* ── GLOW TITLE ── */
  .hero-title h1 {
    text-shadow:
      0 0 10px rgba(0,168,255,0.3),
      0 0 40px rgba(0,168,255,0.15),
      0 0 80px rgba(0,168,255,0.05);
    animation: titlePulse 4s ease-in-out infinite;
  }

  @keyframes titlePulse {
    0%, 100% { text-shadow: 0 0 10px rgba(0,168,255,0.3), 0 0 40px rgba(0,168,255,0.15); }
    50% { text-shadow: 0 0 20px rgba(0,168,255,0.5), 0 0 60px rgba(0,168,255,0.25), 0 0 100px rgba(0,168,255,0.1); }
  }

  /* ── SCROLL PROGRESS ── */
  .scroll-progress {
    position: fixed;
    top: 0; left: 0;
    width: 0%;
    height: 3px;
    background: linear-gradient(90deg, #00a8ff, #00d4ff);
    box-shadow: 0 0 10px rgba(0,168,255,0.5);
    z-index: 9999;
    transition: width 0.1s;
    display: none;
  }

  .scroll-progress.active {
    display: block;
  }

  /* ── CHAPTER HOVER GLOW ── */
  .chapter-item {
    position: relative;
    transition: all 0.3s ease;
  }

  .chapter-item::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 0;
    background: linear-gradient(90deg, rgba(0,168,255,0.08), transparent);
    transition: width 0.4s ease;
    pointer-events: none;
  }

  .chapter-item:hover::before,
  .chapter-item:active::before {
    width: 100%;
  }

  .chap-thumb {
    transition: box-shadow 0.3s ease;
  }

  .chapter-item:hover .chap-thumb,
  .chapter-item:active .chap-thumb {
    box-shadow: 0 0 15px rgba(0,168,255,0.25), 0 0 3px rgba(0,168,255,0.4);
  }

  /* ── SKELETON LOADING ── */
  .skel-item {
    display: flex;
    gap: 14px;
    align-items: center;
    padding: 12px 20px;
    border-bottom: 1px solid #0f2040;
  }

  .skel-thumb {
    width: 64px;
    height: 64px;
    border-radius: 4px;
    background: linear-gradient(110deg, #0a1628 30%, #122a4a 50%, #0a1628 70%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    flex-shrink: 0;
  }

  .skel-lines { flex: 1; display: flex; flex-direction: column; gap: 8px; }

  .skel-line {
    height: 12px;
    border-radius: 4px;
    background: linear-gradient(110deg, #0a1628 30%, #122a4a 50%, #0a1628 70%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
  }

  .skel-line.short { width: 40%; }
  .skel-line.medium { width: 70%; }

  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* ── IMAGE LOADING ── */
  .img-wrapper {
    position: relative;
    width: 100%;
    min-height: 120px;
    background: linear-gradient(110deg, #0a1628 30%, #122a4a 50%, #0a1628 70%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
  }

  .img-wrapper.loaded {
    min-height: 0;
    background: none;
    animation: none;
  }

  .img-wrapper.error {
    min-height: 80px;
    background: #0a1628;
    animation: none;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .img-error-msg {
    font-size: 12px;
    color: #3a5a7a;
    text-align: center;
    padding: 20px;
  }

  .img-wrapper img {
    display: block;
    width: 100%;
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .img-wrapper.loaded img {
    opacity: 1;
  }

  /* ── FADE TRANSITION ── */
  .reader.active {
    display: block;
    animation: fadeSlideIn 0.35s ease-out;
  }

  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>

<body>

<div class="scroll-progress" id="scrollProgress"></div>

<!-- ══════ MAIN VIEW ══════ -->
<div class="main-view" id="mainView">

  <div class="hero-banner">
    <img src="2d2d4163153d10c444cea8b4ddb6ae99.jpg" alt="Fast-track Fortune Formula">

  <div class="series-info">
    <div class="hero-title">
      <h1>Fast-track Fortune Formula</h1>

    <p style="font-size:12px;color:#5a7fa0;margin-bottom:0;">⚠ Truyện giới hạn độ tuổi. Tác giả thù ghét mọi đối tượng bình đẳng như nhau.</p>
    <div id="continueReading" style="display:none;margin-top:12px;">
      <button onclick="continueReading()" style="width:100%;padding:12px;background:#00a8ff;border:none;border-radius:4px;color:#fff;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;">▶ Đọc tiếp GBS#001</button>
    </div>

  <!-- EPISODES -->
  <div class="episodes-panel active" id="episodesPanel">
    <div style="padding:12px 20px 0;">
      <input type="text" id="searchInput" placeholder="Tìm kiếm..." oninput="searchChapters()" 
        style="width:100%;padding:10px 12px;background:#0a1628;border:1px solid #122a4a;border-radius:4px;color:#c8dce8;font-family:inherit;font-size:13px;outline:none;">
    </div>

      <button class="sort-btn" onclick="toggleSort()" title="Đảo thứ tự">⇅</button>

</div>

<div class="reader" id="readerView">
  <div class="reader-nav">
    <button class="back-btn" onclick="closeReader()">←</button>
    <div class="reader-title" id="readerTitle">GBS#001</div>
  </div>
  <div class="reader-content" id="readerContent">

      Ảnh chapter sẽ hiển thị ở đây.<br>

  <div style="padding:12px 20px;display:flex;align-items:center;gap:8px;">
    <button id="likeBtn" onclick="toggleLike()" style="background:none;border:1px solid #122a4a;border-radius:20px;padding:8px 16px;color:#5a7fa0;font-family:inherit;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all 0.15s;">
      <span id="likeIcon">♡</span> <span id="likeCount">0</span>

    <button onclick="shareChapter()" style="background:none;border:1px solid #122a4a;border-radius:20px;padding:8px 16px;color:#5a7fa0;font-family:inherit;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all 0.15s;">

      Đang trả lời <span id="replyToName"></span> <span onclick="cancelReply()" style="margin-left:8px;cursor:pointer;color:#4a6a8a;">✕</span>
    </div>

      <input type="text" id="commentName" placeholder="Tên của bạn" oninput="localStorage.setItem('gbs_name', this.value)" 
        style="width:100%;padding:10px 12px;background:#0a1628;border:1px solid #122a4a;border-radius:4px;color:#c8dce8;font-family:inherit;font-size:13px;margin-bottom:8px;outline:none;">
      <textarea id="commentText" placeholder="Viết bình luận..." rows="3" onfocus="window._formFocusTime = Date.now()"
        style="width:100%;padding:10px 12px;background:#0a1628;border:1px solid #122a4a;border-radius:4px;color:#c8dce8;font-family:inherit;font-size:13px;resize:vertical;outline:none;"></textarea>
      <!-- Honeypot: ẩn khỏi user, bot tự động điền. Tên không phải "website/url/email/name" để password manager ít autofill -->
      <input type="text" id="website_url" name="_hp_field_x9k2" tabindex="-1" autocomplete="off" aria-hidden="true"
        style="position:absolute;left:-9999px;top:-9999px;width:1px;height:1px;opacity:0;pointer-events:none;">
      <button onclick="postComment()" 
        style="margin-top:8px;padding:10px 20px;background:#00a8ff;border:none;border-radius:4px;color:#fff;font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;">Gửi</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-app.js";
  import { getFirestore, collection, addDoc, query, where, onSnapshot, serverTimestamp, doc, setDoc, runTransaction } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyC1mFu5jwgmszDa7bKCaj89BAECxW-6HEQ",
    authDomain: "great-blue-shark.firebaseapp.com",
    projectId: "great-blue-shark",
    storageBucket: "great-blue-shark.firebasestorage.app",
    messagingSenderId: "848130301351",
    appId: "1:848130301351:web:4c063bcd97a0f238e42a82"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  window.firebaseDb = db;
  window.firebaseReady = true;

  // ── BROWSER ID (cho shadow reply) ──
  // Random ID gắn với browser, dùng để filter shadow reply chỉ hiện cho người post
  if (!localStorage.getItem('gbs_bid')) {
    const bid = Math.random().toString(36).slice(2) + Date.now().toString(36) + Math.random().toString(36).slice(2);
    localStorage.setItem('gbs_bid', bid);
  }
  window.browserId = localStorage.getItem('gbs_bid');

  // ── CHARACTER NAMES (cho UI styling) ──
  window.CHARACTER_NAMES = ['Linh cẩu đốm', 'Sư tử'];
  window.CHARACTER_SUFFIX = {
    'Linh cẩu đốm': '9675',
    'Sư tử': '9689'
  };

  // ── USER HASH / SUFFIX / HUE ──
  // Suffix 4 ký tự [a-z0-9] derive từ djb2(browserId + 'suffix_salt_v1').
  // Hue (0-360) derive từ djb2(browserId + 'hue_salt_v1') → suffix và hue không suy ngược được ra browserId.
  // Lưu suffix + hue vào DB khi post comment để mọi máy đều thấy giống nhau.
  // djb2 đủ phân tán cho mục đích này, không cần crypto.
  function djb2(str) {
    let h = 5381;
    for (let i = 0; i < str.length; i++) {
      h = ((h << 5) + h + str.charCodeAt(i)) >>> 0; // unsigned 32-bit
    }
    return h;
  }

  // Suffix: 4 ký tự [a-z0-9]
  function browserIdToSuffix(bid) {
    const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
    let h = djb2(bid + 'suffix_salt_v1');
    let out = '';
    for (let i = 0; i < 4; i++) {
      out += chars[h % 36];
      h = Math.floor(h / 36) + djb2(out + bid); // re-mix để 4 ký tự không bị correlated
    }
    return out;
  }

  // Hue 0-360
  function browserIdToHue(bid) {
    return djb2(bid + 'hue_salt_v1') % 360;
  }

  // Nhân vật: hue cố định (Linh cẩu cam-vàng, Sư tử đỏ-cam)
  const CHARACTER_HUE = {
    'Linh cẩu đốm': 35,
    'Sư tử': 15
  };
  window.CHARACTER_HUE_LOOKUP = CHARACTER_HUE;

  // Lấy { suffix, hue } cho 1 comment.
  // Nhân vật: hardcode. Reader: ưu tiên field DB, fallback null nếu comment cũ.
  function getCommentIdentity(commentData) {
    const name = commentData.name;
    if (window.CHARACTER_SUFFIX[name] !== undefined) {
      return {
        suffix: window.CHARACTER_SUFFIX[name],
        hue: CHARACTER_HUE[name] != null ? CHARACTER_HUE[name] : 200
      };
    }
    if (commentData.userSuffix && commentData.userHue != null) {
      return { suffix: commentData.userSuffix, hue: commentData.userHue };
    }
    return null;
  }

  // Style cho suffix: HSL với S=70%, L=65% (đọc rõ trên nền #060d18)
  function suffixStyle(hue) {
    return 'color: hsl(' + hue + ', 70%, 65%); font-weight: 500;';
  }

  window.getCommentIdentity = getCommentIdentity;
  window.suffixStyle = suffixStyle;
  window.browserIdToSuffix = browserIdToSuffix;
  window.browserIdToHue = browserIdToHue;

  // ── LOAD LIKES PER CHAPTER ──
  // Doc id = firestoreId của chapter (ổn định khi xóa/đảo).
  // Migrate dữ liệu cũ ở backend nếu cần (xem migrateOldData ở dưới).
  window.likeUnsubs = {};
  window.loadAllLikes = function() {
    if (!window.chapters) return;
    // Cleanup listeners cũ
    Object.values(window.likeUnsubs).forEach(unsub => { try { unsub(); } catch(e) {} });
    window.likeUnsubs = {};
    window.chapters.forEach(ch => {
      const docId = ch.firestoreId || ('chapter_' + ch.id);
      const ref = doc(db, 'likes', docId);
      window.likeUnsubs[ch.id] = onSnapshot(ref, (snap) => {
        // Doc chưa tồn tại (chap cũ chưa được seed) → fallback hiện 2
        const count = snap.exists() ? Math.max(0, snap.data().count) : 2;
        const el = document.getElementById('likes-ch-' + ch.id);
        if (el) el.textContent = '♡ ' + count;
      });
    });
  }

  // Helper: lấy likes doc id từ chapter id (số). Cần `window.chapters` đã load.
  function getLikesDocId(chapterId) {
    const ch = window.chapters && window.chapters.find(c => c.id === chapterId);
    return ch && ch.firestoreId ? ch.firestoreId : ('chapter_' + chapterId);
  }

  // ── LIKES ──
  // likedChapters key = firestoreId (ổn định khi xóa/đảo chapter)
  window.likedChapters = JSON.parse(localStorage.getItem('gbs_likes') || '{}');
  window.likeBusy = false;

  window.toggleLike = async function() {
    if (window.likeBusy) return;
    window.likeBusy = true;
    const id = window.currentChapterForComments;
    const docId = getLikesDocId(id);
    const ref = doc(db, 'likes', docId);
    const willLike = !window.likedChapters[docId];
    try {
      await runTransaction(db, async (transaction) => {
        const snap = await transaction.get(ref);
        // Doc chưa tồn tại → coi như đã có 2 (chap cũ chưa seed)
        const current = snap.exists() ? snap.data().count : 2;
        const newCount = willLike ? current + 1 : Math.max(0, current - 1);
        transaction.set(ref, { count: newCount });
      });
      if (willLike) {
        window.likedChapters[docId] = true;
      } else {
        delete window.likedChapters[docId];
      }
      localStorage.setItem('gbs_likes', JSON.stringify(window.likedChapters));
      updateLikeButton(id);
    } catch(e) {
      console.error('Lỗi like:', e);
    }
    window.likeBusy = false;
  }

  window.updateLikeButton = function(chapterId) {
    const docId = getLikesDocId(chapterId);
    const liked = window.likedChapters[docId];
    const icon = document.getElementById('likeIcon');
    const btn = document.getElementById('likeBtn');
    if (icon) icon.textContent = liked ? '♥' : '♡';
    if (btn) btn.style.borderColor = liked ? '#00a8ff' : '#122a4a';
    if (btn) btn.style.color = liked ? '#00a8ff' : '#5a7fa0';
  }

  window.readerLikeUnsub = null;
  window.loadLikes = function(chapterId) {
    // Cleanup listener cũ (mở chap khác → tránh nhiều listener cộng dồn)
    if (window.readerLikeUnsub) { try { window.readerLikeUnsub(); } catch(e) {} }
    const docId = getLikesDocId(chapterId);
    const ref = doc(db, 'likes', docId);
    window.readerLikeUnsub = onSnapshot(ref, (snap) => {
      // Doc chưa tồn tại → fallback hiện 2 (chap cũ chưa seed)
      const count = snap.exists() ? snap.data().count : 2;
      const el = document.getElementById('likeCount');
      if (el) el.textContent = Math.max(0, count);
    });
    updateLikeButton(chapterId);
  }

  window.currentChapterForComments = 1;
  window.replyingTo = null; // { id, name }

  window._lastCommentTime = 0;
  window._formFocusTime = 0;
  window.postComment = async function() {
    // Anti-bot 1: Honeypot - bot thường tự động điền vào input ẩn.
    // Lưu ý: browser/password manager có thể autofill. Check thêm:
    //  - Value khác default ("") 
    //  - User đã focus form (autofill xảy ra trước user interaction)
    const honeypot = document.getElementById('website_url');
    if (honeypot && honeypot.value && honeypot.value !== honeypot.defaultValue && window._formFocusTime > 0) {
      // Im lặng giả vờ thành công để bot không retry
      document.getElementById('commentText').value = '';
      cancelReply();
      return;
    }

    // Anti-bot 2: Time check - bot submit quá nhanh hoặc submit mà không focus form
    if (!window._formFocusTime || (Date.now() - window._formFocusTime) < 3000) {
      // Im lặng, không thông báo để bot không học cách bypass
      return;
    }

    // Rate limit: 30 giây giữa các comment
    const now = Date.now();
    if (now - window._lastCommentTime < 30000) {
      alert('Đợi 30 giây giữa các bình luận.');
      return;
    }

    let name = document.getElementById('commentName').value.trim();
    let text = document.getElementById('commentText').value.trim();
    if (!name) { document.getElementById('commentName').style.borderColor = '#ff4060'; return; }
    document.getElementById('commentName').style.borderColor = '#122a4a';
    if (!text) return;

    // Chặn reader dùng tên nhân vật (sẽ bị Firestore rules reject nữa, đây là check client để UX tốt hơn)
    if (window.CHARACTER_NAMES && window.CHARACTER_NAMES.some(n => n.toLowerCase() === name.toLowerCase())) {
      alert('Tên này không khả dụng.');
      return;
    }

    // Giới hạn độ dài
    if (name.length > 30) name = name.slice(0, 30);
    if (text.length > 1500) text = text.slice(0, 1500);

    // Loại bỏ ký tự điều khiển
    name = name.replace(/[\x00-\x1f]/g, '');
    text = text.replace(/[\x00-\x1f]/g, '').replace(/\n{3,}/g, '\n\n');

    // Check xem có đang reply nhân vật không → shadow reply
    let shadowFor = null;
    if (window.replyingTo && window.replyingTo.isCharacterTarget) {
      shadowFor = window.browserId;
    }

    try {
      const userSuffix = browserIdToSuffix(window.browserId);
      const userHue = browserIdToHue(window.browserId);

      const commentData = {
        chapter: window.currentChapterForComments,
        name: name,
        text: text,
        parentId: window.replyingTo ? window.replyingTo.id : null,
        replyToName: window.replyingTo ? window.replyingTo.name : null,
        replyToSuffix: window.replyingTo ? window.replyingTo.suffix : null,
        replyToHue: window.replyingTo && window.replyingTo.hue != null ? window.replyingTo.hue : null,
        userSuffix: userSuffix,
        userHue: userHue,
        timestamp: serverTimestamp()
      };
      if (shadowFor) commentData.shadowFor = shadowFor;
      await addDoc(collection(db, 'comments'), commentData);
      window._lastCommentTime = Date.now();
      document.getElementById('commentText').value = '';
      cancelReply();
    } catch(e) {
      console.error('Lỗi gửi comment:', e);
    }
  }

  window.commentsUnsub = null;
  window.loadComments = function(chapterId) {
    // Cleanup listener cũ
    if (window.commentsUnsub) { try { window.commentsUnsub(); } catch(e) {} }
    window.currentChapterForComments = chapterId;
    const q = query(
      collection(db, 'comments'),
      where('chapter', '==', chapterId)
    );
    window.commentsUnsub = onSnapshot(q, (snapshot) => {
      const list = document.getElementById('commentsList');
      if (!list) return;
      list.innerHTML = '';

      const all = [];
      snapshot.forEach((d) => { all.push({ id: d.id, ...d.data() }); });
      
      // Lọc shadow reply: nếu có shadowFor, chỉ hiện cho browser đó
      const filtered = all.filter(c => {
        if (!c.shadowFor) return true; // Comment thường, hiện cho tất cả
        return c.shadowFor === window.browserId; // Shadow reply, chỉ hiện cho người post
      });
      
      // Check empty SAU KHI filter
      if (filtered.length === 0) {
        list.innerHTML = '<p style="color:#2a4a6a;font-size:13px;">Chưa có bình luận nào.</p>';
        return;
      }
      
      filtered.sort((a, b) => {
        const ta = a.timestamp ? a.timestamp.seconds : 0;
        const tb = b.timestamp ? b.timestamp.seconds : 0;
        return ta - tb;
      });

      // Tách comment gốc và replies
      const roots = filtered.filter(c => !c.parentId);
      const replies = filtered.filter(c => c.parentId);
      
      // Nhóm replies theo parentId
      const replyMap = {};
      replies.forEach(r => {
        if (!replyMap[r.parentId]) replyMap[r.parentId] = [];
        replyMap[r.parentId].push(r);
      });

      // Render comment gốc + replies bên dưới (replies thu lại được)
      const rootIds = new Set(roots.map(r => r.id));
      roots.forEach((d) => {
        list.appendChild(buildCommentEl(d, false));
        const childReplies = replyMap[d.id] || [];
        if (childReplies.length > 0) {
          // Lưu state mở/đóng theo id comment gốc, mặc định đóng
          if (!window._repliesOpen) window._repliesOpen = {};
          const isOpen = !!window._repliesOpen[d.id];

          // Container chứa replies (ẩn/hiện được)
          const repliesBox = document.createElement('div');
          repliesBox.id = 'replies-' + d.id;
          repliesBox.style.display = isOpen ? 'block' : 'none';
          childReplies.forEach((r) => {
            repliesBox.appendChild(buildCommentEl(r, true));
          });

          // Nút toggle
          const toggleBtn = document.createElement('div');
          toggleBtn.id = 'toggle-' + d.id;
          toggleBtn.style.cssText = 'margin-left:24px;margin-bottom:4px;padding:6px 12px;font-size:12px;color:#5a7fa0;cursor:pointer;user-select:none;display:inline-block;';
          toggleBtn.textContent = isOpen
            ? '▾ Ẩn ' + childReplies.length + ' trả lời'
            : '▸ Xem ' + childReplies.length + ' trả lời';
          // Escape id cho onclick inline
          const safeRootId = d.id.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
          toggleBtn.onclick = function() { window.toggleReplies(safeRootId, childReplies.length); };

          list.appendChild(toggleBtn);
          list.appendChild(repliesBox);
        }
      });

      // Orphan replies (parent đã bị xóa hoặc comment cũ không có parent hợp lệ)
      replies.forEach((r) => {
        if (!rootIds.has(r.parentId)) {
          list.appendChild(buildCommentEl(r, false));
        }
      });
    });
  }

  function formatRelativeTime(seconds) {
    if (!seconds) return '';
    const now = Date.now() / 1000;
    const diff = now - seconds;
    
    if (diff < 0) return 'vừa xong';
    if (diff < 60) return 'vừa xong';
    if (diff < 3600) {
      const m = Math.floor(diff / 60);
      return m + ' phút trước';
    }
    if (diff < 86400) {
      const h = Math.floor(diff / 3600);
      return h + ' giờ trước';
    }
    if (diff < 86400 * 7) {
      const d = Math.floor(diff / 86400);
      return d + ' ngày trước';
    }
    if (diff < 86400 * 30) {
      const w = Math.floor(diff / (86400 * 7));
      return w + ' tuần trước';
    }
    if (diff < 86400 * 365) {
      const mo = Math.floor(diff / (86400 * 30));
      return mo + ' tháng trước';
    }
    const y = Math.floor(diff / (86400 * 365));
    return y + ' năm trước';
  }

  window.escapeHtml = function(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  };

  function escapeHtml(s) { return window.escapeHtml(s); }

  function buildCommentEl(d, isReply) {
    const time = d.timestamp ? formatRelativeTime(d.timestamp.seconds) : '';
    const safeText = escapeHtml(d.text);
    const displayName = escapeHtml(d.name);
    // rootId: nếu đây là reply, rootId = parentId của nó (cho replyTo gắn vào root)
    // Còn nếu đây là root, rootId = chính id của nó.
    const rootId = isReply && d.parentId ? d.parentId : d.id;

    // Identity của comment này (suffix + hue để hiện sau tên)
    const identity = window.getCommentIdentity(d);
    let suffixHtml = '';
    if (identity) {
      suffixHtml = ' <span style="' + window.suffixStyle(identity.hue) + 'font-size:11px;">#' + escapeHtml(identity.suffix) + '</span>';
    }

    // Reply tag: "→ Tên #suffix" với suffix có màu
    let replyTag = '';
    if (d.replyToName) {
      let replyTagHtml = ' <span style="font-size:11px;color:#4a6a8a;font-weight:400;">→ ' + escapeHtml(d.replyToName);
      // Suffix của người được rep
      // Comment cũ không có replyToSuffix/replyToHue → check nhân vật trước
      let rSuffix = d.replyToSuffix;
      let rHue = d.replyToHue;
      if ((!rSuffix || rHue == null) && window.CHARACTER_SUFFIX[d.replyToName] !== undefined) {
        rSuffix = window.CHARACTER_SUFFIX[d.replyToName];
        rHue = window.CHARACTER_HUE_LOOKUP[d.replyToName] != null ? window.CHARACTER_HUE_LOOKUP[d.replyToName] : 200;
      }
      if (rSuffix && rHue != null) {
        replyTagHtml += ' <span style="' + window.suffixStyle(Number(rHue)) + '">#' + escapeHtml(rSuffix) + '</span>';
      }
      replyTagHtml += '</span>';
      replyTag = replyTagHtml;
    }

    const isChar = d.isCharacter === true;

    const div = document.createElement('div');
    div.style.cssText = isReply
      ? 'padding:10px 12px;background:#0a1225;border-radius:4px;margin-bottom:4px;margin-left:24px;border-left:2px solid #0d1a35;'
      : 'padding:12px;background:#081420;border-radius:4px;margin-bottom:4px;';

    // Phần header + text: dùng innerHTML vì đã escape tất cả các biến (displayName, safeText, suffixHtml, replyTag).
    // suffixHtml và replyTag tự build từ escapeHtml() nên cũng OK.
    div.innerHTML = ''
      + '<div style="display:flex;justify-content:space-between;margin-bottom:4px;">'
      +   '<span style="font-size:12px;font-weight:600;color:#00a8ff;">' + displayName + suffixHtml + replyTag + '</span>'
      +   '<span style="font-size:11px;color:#2a4a6a;">' + time + '</span>'
      + '</div>'
      + '<p style="font-size:13px;color:#a0c0d8;line-height:1.5;margin:0;white-space:pre-wrap;">' + safeText + '</p>';

    // Phần nút "Trả lời": build bằng createElement + addEventListener để KHÔNG NHÚNG name/id vào HTML attribute.
    // Đây là fix cho XSS: trước đây dùng onclick="replyTo('...name...')" → name chứa dấu " sẽ thoát attribute.
    const replyWrap = document.createElement('div');
    replyWrap.style.marginTop = '5px';
    const replyBtn = document.createElement('span');
    replyBtn.style.cssText = 'font-size:11px;color:#4a6a8a;cursor:pointer;';
    replyBtn.textContent = '↩ Trả lời';
    // Lưu data vào closure (KHÔNG qua HTML attribute)
    const replyData = {
      rootId: rootId,
      name: d.name,
      isCharacterTarget: isChar,
      suffix: identity ? identity.suffix : null,
      hue: identity ? identity.hue : null
    };
    replyBtn.addEventListener('click', function() {
      window.replyTo(replyData.rootId, replyData.name, replyData.isCharacterTarget, replyData.suffix, replyData.hue);
    });
    replyWrap.appendChild(replyBtn);
    div.appendChild(replyWrap);

    return div;
  }

  window.toggleReplies = function(rootId, count) {
    if (!window._repliesOpen) window._repliesOpen = {};
    const box = document.getElementById('replies-' + rootId);
    const btn = document.getElementById('toggle-' + rootId);
    if (!box || !btn) return;
    const willOpen = box.style.display === 'none';
    box.style.display = willOpen ? 'block' : 'none';
    btn.textContent = willOpen
      ? '▾ Ẩn ' + count + ' trả lời'
      : '▸ Xem ' + count + ' trả lời';
    window._repliesOpen[rootId] = willOpen;
  }

  window.replyTo = function(commentId, name, isCharacterTarget, replySuffix, replyHue) {
    window.replyingTo = {
      id: commentId,
      name: name,
      isCharacterTarget: !!isCharacterTarget,
      suffix: replySuffix || null,
      hue: (replyHue != null && replyHue !== '') ? Number(replyHue) : null
    };
    document.getElementById('replyIndicator').style.display = 'block';
    // Hiện tên + suffix có màu trong indicator
    const nameEl = document.getElementById('replyToName');
    let html = window.escapeHtml(name);
    if (replySuffix && replyHue != null && replyHue !== '') {
      html += ' <span style="' + window.suffixStyle(Number(replyHue)) + '">#' + window.escapeHtml(replySuffix) + '</span>';
    }
    nameEl.innerHTML = html;
    // Mở sẵn box replies của root để user thấy reply mình sắp post
    if (!window._repliesOpen) window._repliesOpen = {};
    window._repliesOpen[commentId] = true;
    document.getElementById('commentText').focus();
  }

  window.cancelReply = function() {
    window.replyingTo = null;
    document.getElementById('replyIndicator').style.display = 'none';
  }

  </script>

<script>
  // ── DATA (loaded from Firestore) ──
  let chapters = [];
  let chaptersLoaded = false;

  // Helper: lấy stable key cho chapter (dùng firestoreId nếu có).
  // Dùng cho mọi storage key (localStorage, Firestore likes doc id).
  // KHÔNG dùng id 1,2,3 trực tiếp vì id sẽ shift khi xóa/đảo chapter.
  function getChapterKey(idOrChapter) {
    const ch = typeof idOrChapter === 'object'
      ? idOrChapter
      : chapters.find(c => c.id === idOrChapter);
    if (ch && ch.firestoreId) return ch.firestoreId;
    return 'ch_' + (typeof idOrChapter === 'object' ? idOrChapter.id : idOrChapter);
  }
  window.getChapterKey = getChapterKey;

  async function loadChaptersFromFirestore() {
    try {
      // Wait for Firebase to be ready
      while (!window.firebaseDb) {
        await new Promise(r => setTimeout(r, 100));
      }
      const { collection, getDocs, query, orderBy } = await import("https://www.gstatic.com/firebasejs/11.4.0/firebase-firestore.js");
      const q = query(collection(window.firebaseDb, 'chapters'), orderBy('order', 'asc'));
      const snapshot = await getDocs(q);
      chapters = [];
      let idx = 1;
      snapshot.forEach((d) => {
        const data = d.data();
        chapters.push({
          id: idx,
          firestoreId: d.id,
          title: data.title || ('#' + idx),
          thumbnail: data.thumbnail || null,
          description: data.description || null,
          images: data.images || []
        });
        idx++;
      });
      chaptersLoaded = true;
      window.chapters = chapters;

      // ── MIGRATE localStorage cũ (key số 1,2,3) sang key firestoreId ──
      // Chạy 1 lần, đánh dấu trong localStorage để khỏi chạy lại
      if (!localStorage.getItem('gbs_migrated_v1')) {
        try {
          const oldRead = JSON.parse(localStorage.getItem('gbs_read') || '{}');
          const oldBookmarks = JSON.parse(localStorage.getItem('gbs_bookmarks') || '{}');
          const oldLikes = JSON.parse(localStorage.getItem('gbs_likes') || '{}');
          const newRead = {};
          const newBookmarks = {};
          const newLikes = {};
          chapters.forEach(ch => {
            const newKey = ch.firestoreId;
            if (oldRead[ch.id]) newRead[newKey] = true;
            if (oldBookmarks[ch.id]) newBookmarks[newKey] = oldBookmarks[ch.id];
            // likes cũ lưu theo id số, mới lưu theo doc id Firestore
            if (oldLikes[ch.id]) newLikes[newKey] = true;
          });
          // Giữ luôn key cũ nếu chưa được map (phòng trường hợp chapter bị xóa khỏi DB)
          Object.keys(oldRead).forEach(k => { if (!(k in newRead)) newRead[k] = oldRead[k]; });
          Object.keys(oldBookmarks).forEach(k => { if (!(k in newBookmarks)) newBookmarks[k] = oldBookmarks[k]; });
          Object.keys(oldLikes).forEach(k => { if (!(k in newLikes)) newLikes[k] = oldLikes[k]; });
          localStorage.setItem('gbs_read', JSON.stringify(newRead));
          localStorage.setItem('gbs_bookmarks', JSON.stringify(newBookmarks));
          localStorage.setItem('gbs_likes', JSON.stringify(newLikes));
          localStorage.setItem('gbs_migrated_v1', '1');
          // Reload biến trong memory (đã đọc trước migration)
          window.likedChapters = newLikes;
        } catch(e) { console.warn('Migrate localStorage lỗi:', e); }
      }

      renderChapters();
      updateContinueReading();
      if (window.loadAllLikes) window.loadAllLikes();

      // Auto-open from shared link
      // Format mới: ?ch=<firestoreId> (stable, không shift khi xóa chap)
      // Format cũ: ?ch=<số 1,2,3> (backward-compat, có thể trỏ sai chap nếu đã xóa)
      const urlParams = new URLSearchParams(window.location.search);
      const sharedParam = urlParams.get('ch');
      if (sharedParam) {
        // Thử match firestoreId trước
        const matchByFid = chapters.find(c => c.firestoreId === sharedParam);
        if (matchByFid) {
          openReader(matchByFid.id);
        } else {
          // Fallback: parse số (link cũ)
          const sharedCh = parseInt(sharedParam);
          if (sharedCh && sharedCh >= 1 && sharedCh <= chapters.length) {
            openReader(sharedCh);
          }
        }
      }
    } catch(e) {
      console.error('Lỗi tải chapters:', e);
      // Fallback: show message
      document.getElementById('chapterList').innerHTML = '<li style="padding:20px;text-align:center;color:#4a6a8a;font-size:13px;">Không tải được danh sách chương.</li>';
    }
  }

  let sortAsc = true;
  let currentChapter = 0;

  // ── READ HISTORY ──
  // Key: firestoreId (ổn định khi xóa/đảo chapter). Migrate dữ liệu cũ ở loadChaptersFromFirestore.
  function getReadHistory() {
    return JSON.parse(localStorage.getItem('gbs_read') || '{}');
  }

  function markAsRead(id) {
    const history = getReadHistory();
    const key = getChapterKey(id);
    history[key] = true;
    localStorage.setItem('gbs_read', JSON.stringify(history));
  }

  function isChapterRead(id) {
    const history = getReadHistory();
    return !!history[getChapterKey(id)];
  }

  // ── RENDER CHAPTERS ──
  function renderChapters(filter) {
    const list = document.getElementById('chapterList');
    let sorted = sortAsc ? [...chapters] : [...chapters].reverse();
    if (filter) {
      const q = filter.toLowerCase();
      sorted = sorted.filter(ch => ch.title.toLowerCase().includes(q) || String(ch.id).includes(q));
    }
    document.getElementById('chapCount').textContent = sorted.length + ' episodes';
    list.innerHTML = sorted.map(ch => {
      const isRead = isChapterRead(ch.id);
      const safeTitle = ch.title ? window.escapeHtml(ch.title) : '';
      const safeDesc = ch.description ? window.escapeHtml(ch.description) : '';
      const safeThumb = ch.thumbnail ? window.escapeHtml(ch.thumbnail) : 'thumb.png';
      return `
      <a class="chapter-item${isRead ? ' read' : ''}" onclick="openReader(${ch.id})">
        <div class="chap-thumb">
          <img src="${safeThumb}" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:4px;" loading="lazy">
        </div>
        <div class="chap-info">
          <div class="chap-title">
            #${ch.id}${ch.title && ch.title !== ('#' + ch.id) ? ' - ' + safeTitle : ''}
          </div>
          ${safeDesc ? `<div class="chap-desc">${safeDesc}</div>` : ''}
          <div class="chap-meta">
            <span id="likes-ch-${ch.id}">♡ 0</span>
          </div>
        </div>
      </a>`;
    }).join('');
  }

  // ── SEARCH ──
  function searchChapters() {
    const q = document.getElementById('searchInput').value.trim();
    renderChapters(q || null);
    if (window.loadAllLikes) window.loadAllLikes();
  }

  // ── SORT ──
  function toggleSort() {
    sortAsc = !sortAsc;
    const q = document.getElementById('searchInput').value.trim();
    renderChapters(q || null);
    if (window.loadAllLikes) window.loadAllLikes();
  }

  // ── BOOKMARK ──
  let bookmarkTimer = null;

  function getBookmarks() {
    return JSON.parse(localStorage.getItem('gbs_bookmarks') || '{}');
  }

  function saveBookmark() {
    if (!currentChapter) return;
    const content = document.getElementById('readerContent');
    if (!content) return;
    const images = content.querySelectorAll('img');
    if (images.length === 0) return;

    // Tìm ảnh đang hiện trên màn hình
    let visibleIdx = 0;
    const viewportMid = window.innerHeight / 3;
    for (let i = 0; i < images.length; i++) {
      const rect = images[i].getBoundingClientRect();
      if (rect.top <= viewportMid && rect.bottom > 0) {
        visibleIdx = i;
      }
    }

    const bookmarks = getBookmarks();
    const key = getChapterKey(currentChapter);
    // Nếu đang ở ảnh cuối hoặc đầu → xóa bookmark (đọc xong hoặc mới mở)
    if (visibleIdx >= images.length - 1 || visibleIdx === 0) {
      delete bookmarks[key];
    } else {
      bookmarks[key] = { imageIdx: visibleIdx };
    }
    localStorage.setItem('gbs_bookmarks', JSON.stringify(bookmarks));
  }

  function restoreBookmark(chapterId) {
    const bookmarks = getBookmarks();
    const bm = bookmarks[getChapterKey(chapterId)];
    if (!bm) return;

    const content = document.getElementById('readerContent');
    const images = content.querySelectorAll('img');
    if (images.length === 0 || bm.imageIdx === 0) return;

    const targetImg = images[Math.min(bm.imageIdx, images.length - 1)];
    
    // Đợi ảnh load xong rồi mới scroll
    let loaded = 0;
    const totalToWait = Math.min(bm.imageIdx + 1, images.length);
    
    function tryScroll() {
      targetImg.scrollIntoView({ behavior: 'instant' });
    }

    for (let i = 0; i < totalToWait; i++) {
      if (images[i].complete) {
        loaded++;
        if (loaded >= totalToWait) tryScroll();
      } else {
        images[i].addEventListener('load', () => {
          loaded++;
          if (loaded >= totalToWait) tryScroll();
        }, { once: true });
      }
    }

    // Fallback nếu ảnh load quá lâu
    setTimeout(tryScroll, 2000);
  }

  function startBookmarkTracking() {
    const progressEl = document.getElementById('scrollProgress');
    window.addEventListener('scroll', () => {
      const inReader = document.getElementById('readerView').classList.contains('active');
      
      // Scroll progress bar
      if (inReader) {
        progressEl.classList.add('active');
        const readerContent = document.getElementById('readerContent');
        const rect = readerContent.getBoundingClientRect();
        const total = readerContent.scrollHeight;
        const scrolled = -rect.top + window.innerHeight;
        const pct = Math.min(100, Math.max(0, (scrolled / total) * 100));
        progressEl.style.width = pct + '%';
      } else {
        progressEl.classList.remove('active');
      }

      // Bookmark
      if (!inReader) return;
      clearTimeout(bookmarkTimer);
      bookmarkTimer = setTimeout(saveBookmark, 500);
    });
  }

  startBookmarkTracking();

  // ── CHẶN TẢI ẢNH (chỉ áp dụng khi đang ở reader) ──
  function isInReader() {
    const r = document.getElementById('readerView');
    return r && r.classList.contains('active');
  }

  // Chặn chuột phải (contextmenu) trong reader
  document.addEventListener('contextmenu', (e) => {
    if (!isInReader()) return;
    const target = e.target;
    // Chỉ chặn trên ảnh và vùng reader-content
    if (target.tagName === 'IMG' || target.closest('.reader-content')) {
      e.preventDefault();
    }
  });

  // Chặn drag ảnh
  document.addEventListener('dragstart', (e) => {
    if (!isInReader()) return;
    if (e.target.tagName === 'IMG' || e.target.closest('.reader-content')) {
      e.preventDefault();
    }
  });

  // Chặn Ctrl+S, Ctrl+Shift+S, Ctrl+U (view source) khi ở reader
  document.addEventListener('keydown', (e) => {
    if (!isInReader()) return;
    const k = e.key.toLowerCase();
    if ((e.ctrlKey || e.metaKey) && (k === 's' || k === 'u')) {
      e.preventDefault();
    }
  });

  // ── IMAGE LOAD HANDLERS ──
  function imgLoaded(i) {
    const wrap = document.getElementById('imgWrap' + i);
    if (wrap) wrap.classList.add('loaded');
  }

  function imgError(i) {
    const wrap = document.getElementById('imgWrap' + i);
    if (!wrap) return;
    wrap.classList.add('error');
    wrap.innerHTML = '<div class="img-error-msg">Không tải được ảnh</div>';
  }

  // ── READER ──
  function openReader(id) {
    currentChapter = id;
    markAsRead(id);
    document.getElementById('mainView').classList.add('hidden');
    document.getElementById('readerView').classList.add('active');
    const ch = chapters.find(c => c.id === id);
    const titleText = ch && ch.title && ch.title !== ('#' + id) ? '#' + id + ' - ' + ch.title : '#' + id;
    document.getElementById('readerTitle').textContent = titleText;
    const content = document.getElementById('readerContent');
    if (ch && ch.images && ch.images.length > 0) {
      content.innerHTML = ch.images.map((img, i) => `<div class="img-wrapper" id="imgWrap${i}"><img src="${window.escapeHtml(img)}" alt="" loading="lazy" onload="imgLoaded(${i})" onerror="imgError(${i})"></div>`).join('');
      // Restore bookmark
      restoreBookmark(id);
    } else {
      content.innerHTML = '<div class="reader-placeholder">Ảnh chapter sẽ hiển thị ở đây.<br>Cuộn xuống để đọc.</div>';
      window.scrollTo(0, 0);
    }
    updateReaderNav();
    if (window.loadComments) window.loadComments(id);
    if (window.loadLikes) window.loadLikes(id);
    const savedName = localStorage.getItem('gbs_name');
    if (savedName) document.getElementById('commentName').value = savedName;
  }

  function closeReader() {
    saveBookmark();
    document.getElementById('scrollProgress').classList.remove('active');
    document.getElementById('mainView').classList.remove('hidden');
    document.getElementById('readerView').classList.remove('active');
    renderChapters();
    if (window.loadAllLikes) window.loadAllLikes();
    updateContinueReading();
  }

  function prevChapter() {
    saveBookmark();
    if (currentChapter > 1) openReader(currentChapter - 1);
  }

  function nextChapter() {
    saveBookmark();
    if (currentChapter < chapters.length) openReader(currentChapter + 1);
  }

  function updateReaderNav() {
    document.getElementById('prevBtn').disabled = currentChapter <= 1;
    document.getElementById('nextBtn').disabled = currentChapter >= chapters.length;
  }

  function shareChapter() {
    // Dùng firestoreId (stable) thay vì id số 1,2,3 (sẽ shift khi xóa/đảo chapter).
    // Backward-compat: vẫn nhận ?ch=số ở loadChaptersFromFirestore (link cũ vẫn mở được,
    // chỉ có thể trỏ tới chap khác nếu đã xóa chap giữa — không có cách nào cứu link cũ).
    const ch = chapters.find(c => c.id === currentChapter);
    const param = ch && ch.firestoreId ? ch.firestoreId : currentChapter;
    const url = window.location.origin + window.location.pathname + '?ch=' + encodeURIComponent(param);
    navigator.clipboard.writeText(url).then(() => {
      const msg = document.getElementById('shareMsg');
      msg.style.display = 'inline';
      setTimeout(() => { msg.style.display = 'none'; }, 2000);
    }).catch(() => {
      prompt('Copy link:', url);
    });
  }

  function updateContinueReading() {
    const history = getReadHistory();
    // Tìm chapter đã đọc cuối cùng dựa trên firestoreId/key, rồi map về index 1,2,3
    const readChapters = chapters.filter(ch => history[getChapterKey(ch)]);
    const container = document.getElementById('continueReading');
    if (!container) return;

    if (readChapters.length === 0) {
      if (chapters.length > 0) {
        container.style.display = 'block';
        container.innerHTML = '<button onclick="openReader(1)" style="width:100%;padding:12px;background:#00a8ff;border:none;border-radius:4px;color:#fff;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;">▶ Bắt đầu đọc</button>';
      } else {
        container.style.display = 'none';
      }
    } else {
      const lastRead = Math.max(...readChapters.map(c => c.id));
      const nextCh = lastRead < chapters.length ? lastRead + 1 : lastRead;
      const isNext = lastRead < chapters.length;
      const label = isNext ? 'Đọc tiếp #' + nextCh : 'Đọc lại #' + nextCh;
      container.style.display = 'block';
      container.innerHTML = '<button onclick="openReader(' + nextCh + ')" style="width:100%;padding:12px;background:#00a8ff;border:none;border-radius:4px;color:#fff;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;">▶ ' + label + '</button>';
    }
  }

  // ── INIT ──
  renderChapters(); // render empty first
  // Hiện skeleton loading
  if (chapters.length === 0) {
    document.getElementById('chapterList').innerHTML = Array(4).fill(`
      <li class="skel-item">
        <div class="skel-thumb"></div>
        <div class="skel-lines">
          <div class="skel-line medium"></div>
          <div class="skel-line short"></div>
        </div>
      </li>
    `).join('');
  }
  loadChaptersFromFirestore(); // then load from Firestore

  function tryLoadFirebase() {
    if (window.loadAllLikes) {
      window.loadAllLikes();
    } else {
      setTimeout(tryLoadFirebase, 500);
    }
  }
  tryLoadFirebase();

  // Auto-open handled in loadChaptersFromFirestore
</script>
</body>
</html>
