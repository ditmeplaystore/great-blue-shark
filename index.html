<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Great Blue Shark</title>
<meta property="og:title" content="Great Blue Shark">
<meta property="og:image" content="https://ditmeplaystore.github.io/great-blue-shark/2d2d4163153d10c444cea8b4ddb6ae99.jpg">
<meta property="og:url" content="https://ditmeplaystore.github.io/great-blue-shark/">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Great Blue Shark">
<meta name="twitter:image" content="https://ditmeplaystore.github.io/great-blue-shark/2d2d4163153d10c444cea8b4ddb6ae99.jpg">
<link rel="icon" type="image/png" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&family=Lilita+One&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Be Vietnam Pro', sans-serif;
    background: #060d18;
    color: #c8dce8;
    min-height: 100vh;
    max-width: 940px;
    margin: 0 auto;
  }

  /* ── BANNER ── */
  .hero-banner {
    position: relative;
    width: 100%;
    height: 300px;
    overflow: hidden;
  }

  .hero-banner img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    display: block;
  }

  .hero-banner::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 40%;
    background: linear-gradient(to top, #060d18 0%, #060d18cc 20%, transparent 100%);
    z-index: 1;
    pointer-events: none;
  }

  .bubble {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, rgba(0,212,255,0.6), rgba(0,168,255,0.2));
    border: 1px solid rgba(0,212,255,0.3);
    animation: bubbleUp linear infinite;
    pointer-events: none;
    z-index: 1;
  }

  @keyframes bubbleUp {
    0% { transform: translateY(0) scale(1); opacity: 1; }
    50% { opacity: 0.6; }
    100% { transform: translateY(-300px) scale(0.3); opacity: 0; }
  }

  @keyframes sharkFall {
    0% { top: -60px; opacity: 1; }
    90% { opacity: 1; }
    100% { top: 110vh; opacity: 0; }
  }

  .hero-title {
    position: absolute;
    bottom: 16px;
    left: 20px;
    right: 20px;
    z-index: 2;
    pointer-events: none;
  }

  .series-info {
    padding: 12px 20px 16px;
    border-bottom: 1px solid #0f2040;
  }

  .series-info h1 {
    font-family: 'Lilita One', sans-serif;
    font-size: 24px;
    font-weight: 400;
    margin-bottom: 10px;
    letter-spacing: 1px;
  }

  .genre-tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .genre-tag {
    font-size: 11px;
    padding: 4px 10px;
    background: #0a1628;
    border: 1px solid #122a4a;
    border-radius: 3px;
    color: #5a7fa0;
  }

  .banner-stats {
    display: flex;
    gap: 14px;
    font-size: 12px;
    color: #4a6a8a;
    margin-top: 10px;
  }

  .banner-stats span {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  /* ── TABS ── */
  .tabs {
    display: flex;
    border-bottom: 1px solid #0f2040;
    position: sticky;
    top: 0;
    background: #060d18;
    z-index: 10;
  }

  .tab {
    flex: 1;
    padding: 14px;
    text-align: center;
    font-size: 14px;
    font-weight: 600;
    color: #4a6a8a;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
  }

  .tab.active {
    color: #c8dce8;
    border-bottom-color: #00a8ff;
  }

  /* ── CHAPTER HEADER ── */
  .chapter-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 20px;
  }

  .chapter-header span {
    font-size: 14px;
    font-weight: 600;
    color: #8ab0cc;
  }

  .sort-btn {
    background: none;
    border: none;
    color: #3a5a7a;
    cursor: pointer;
    padding: 4px;
    font-size: 18px;
  }

  /* ── CHAPTER LIST ── */
  .chapter-list {
    list-style: none;
  }

  .chapter-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 20px;
    cursor: pointer;
    transition: background 0.15s;
    border-bottom: 1px solid #081420;
    text-decoration: none;
    color: inherit;
  }

  .chapter-item:hover {
    background: #081420;
  }

  .chapter-item.read {
    opacity: 0.5;
  }

  .chap-thumb {
    width: 64px;
    height: 64px;
    border-radius: 4px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    color: #4a6a8a;
    overflow: hidden;
  }

  .chap-thumb-inner {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .chap-info {
    flex: 1;
    min-width: 0;
  }

  .chap-label {
    font-size: 11px;
    color: #4a6a8a;
    margin-bottom: 2px;
  }

  .chap-title {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .chap-meta {
    font-size: 11px;
    color: #4a6a8a;
    display: flex;
    gap: 10px;
  }

  .chap-desc {
    font-size: 12px;
    color: #3a5a7a;
    margin-bottom: 4px;
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* ── DETAILS TAB ── */
  .details-panel {
    display: none;
    padding: 24px 20px;
  }

  .details-panel.active {
    display: block;
  }

  .details-panel h3 {
    font-size: 14px;
    font-weight: 600;
    color: #8ab0cc;
    margin-bottom: 10px;
  }

  .details-panel p {
    font-size: 13px;
    line-height: 1.7;
    color: #4a6a8a;
    margin-bottom: 24px;
  }

  .genre-tags {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }

  .episodes-panel {
    display: none;
  }
  .episodes-panel.active {
    display: block;
  }

  /* ── READER VIEW ── */
  .reader {
    display: none;
    min-height: 100vh;
  }

  .reader.active {
    display: block;
  }

  .reader-nav {
    position: sticky;
    top: 0;
    background: #060d18;
    border-bottom: 1px solid #0f2040;
    display: flex;
    align-items: center;
    padding: 12px 16px;
    gap: 12px;
    z-index: 10;
  }

  .back-btn {
    background: none;
    border: none;
    color: #8ab0cc;
    font-size: 20px;
    cursor: pointer;
    padding: 4px;
  }

  .reader-title {
    font-size: 14px;
    font-weight: 600;
    flex: 1;
  }

  .reader-content {
    padding: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    background: #040a14;
    min-height: 60vh;
  }

  .reader-placeholder {
    padding: 60px 20px;
    text-align: center;
    color: #1a3a5a;
    font-size: 13px;
    line-height: 1.8;
  }

  .reader-bottom {
    padding: 20px;
    display: flex;
    gap: 10px;
  }

  .reader-bottom button {
    flex: 1;
    padding: 12px;
    background: #0a1628;
    border: 1px solid #122a4a;
    color: #8ab0cc;
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .reader-bottom button:hover {
    background: #222;
    color: #c8dce8;
  }

  .reader-bottom button:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  /* ── MAIN VIEW TOGGLE ── */
  .main-view {
    display: block;
  }

  .main-view.hidden {
    display: none;
  }

  /* ── COLOR PALETTE FOR THUMBNAILS ── */
  .t1 { background: #0a1525; }
  .t2 { background: #081830; }
  .t3 { background: #0c1a28; }
  .t4 { background: #0a1620; }
  .t5 { background: #0b1230; }
</style>
</head>
<body>

<!-- ══════ MAIN VIEW ══════ -->
<div class="main-view" id="mainView">

  <div class="hero-banner" id="heroBanner">
    <img src="2d2d4163153d10c444cea8b4ddb6ae99.jpg" alt="Great Blue Shark">
    <div class="hero-title">
      <h1 style="font-family:'Lilita One',sans-serif;font-size:32px;font-weight:400;letter-spacing:1px;margin:0;">GREAT BLUE SHARK</h1>
    </div>
  </div>

  <script>
    (function() {
      const banner = document.getElementById('heroBanner');
      function spawnBubble() {
        const b = document.createElement('div');
        b.className = 'bubble';
        const size = Math.random() * 18 + 6;
        b.style.width = size + 'px';
        b.style.height = size + 'px';
        b.style.left = Math.random() * 100 + '%';
        b.style.bottom = '0px';
        b.style.animationDuration = (Math.random() * 4 + 3) + 's';
        b.style.animationDelay = (Math.random() * 0.5) + 's';
        banner.appendChild(b);
        setTimeout(() => b.remove(), 8000);
      }
      setInterval(spawnBubble, 600);

      // 🦈 EASTER EGG
      let clickCount = 0;
      let lastTap = 0;
      let isTouchDevice = false;
      
      banner.addEventListener('touchstart', function() {
        isTouchDevice = true;
        handleTap();
      }, {passive: true});
      
      banner.addEventListener('click', function() {
        if (isTouchDevice) return;
        handleTap();
      });

      function handleTap() {
        const now = Date.now();
        if (now - lastTap > 3000) clickCount = 0;
        lastTap = now;
        clickCount++;
        if (clickCount >= 10) {
          clickCount = 0;
          sharkRain();
        }
      }

      function sharkRain() {
        for (let i = 0; i < 30; i++) {
          setTimeout(() => {
            const shark = document.createElement('img');
            shark.src = 'favicon.png';
            shark.style.cssText = 'position:fixed;z-index:9999;pointer-events:none;width:' + (Math.random() * 40 + 20) + 'px;left:' + (Math.random() * 100) + 'vw;top:-60px;';
            shark.style.animation = 'sharkFall ' + (Math.random() * 2 + 1.5) + 's linear forwards';
            shark.style.transform = 'rotate(' + (Math.random() * 360) + 'deg)';
            document.body.appendChild(shark);
            setTimeout(() => shark.remove(), 4000);
          }, i * 100);
        }
      }
    })();
  </script>

  <div class="series-info">
    <p style="font-size:12px;color:#5a7fa0;margin-bottom:0;">⚠ Truyện giới hạn độ tuổi. Tác giả thù ghét mọi đối tượng bình đẳng như nhau.</p>
    <div id="continueReading" style="display:none;margin-top:12px;">
      <button onclick="continueReading()" style="width:100%;padding:12px;background:#00a8ff;border:none;border-radius:4px;color:#fff;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;">▶ Đọc tiếp GBS#001</button>
    </div>
  </div>

  <!-- EPISODES -->
  <div class="episodes-panel active" id="episodesPanel">
    <div style="padding:12px 20px 0;">
      <input type="text" id="searchInput" placeholder="Tìm kiếm..." oninput="searchChapters()" 
        style="width:100%;padding:10px 12px;background:#0a1628;border:1px solid #122a4a;border-radius:4px;color:#c8dce8;font-family:inherit;font-size:13px;outline:none;">
    </div>
    <div class="chapter-header">
      <span id="chapCount">5 episodes</span>
      <button class="sort-btn" onclick="toggleSort()" title="Đảo thứ tự">⇅</button>
    </div>
    <ul class="chapter-list" id="chapterList"></ul>
  </div>


</div>

<!-- ══════ READER VIEW ══════ -->
<div class="reader" id="readerView">
  <div class="reader-nav">
    <button class="back-btn" onclick="closeReader()">←</button>
    <div class="reader-title" id="readerTitle">GBS#001</div>
  </div>
  <div class="reader-content" id="readerContent">
    <div class="reader-placeholder">
      Ảnh chapter sẽ hiển thị ở đây.<br>
      Cuộn xuống để đọc.
    </div>
  </div>
  <div style="padding:12px 20px;display:flex;align-items:center;gap:8px;">
    <button id="likeBtn" onclick="toggleLike()" style="background:none;border:1px solid #122a4a;border-radius:20px;padding:8px 16px;color:#5a7fa0;font-family:inherit;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all 0.15s;">
      <span id="likeIcon">♡</span> <span id="likeCount">0</span>
    </button>
    <button onclick="shareChapter()" style="background:none;border:1px solid #122a4a;border-radius:20px;padding:8px 16px;color:#5a7fa0;font-family:inherit;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all 0.15s;">
      🔗 Chia sẻ
    </button>
    <span id="shareMsg" style="font-size:11px;color:#00a8ff;display:none;">Đã copy!</span>
  </div>
  <div class="reader-bottom">
    <button id="prevBtn" onclick="prevChapter()">← Chap trước</button>
    <button id="nextBtn" onclick="nextChapter()">Chap sau →</button>
  </div>
  <div class="comments-section" style="padding:20px;">
    <h3 style="font-size:14px;font-weight:600;color:#8ab0cc;margin-bottom:16px;">Bình luận</h3>
    <div id="commentsList" style="margin-bottom:16px;"></div>
    <div id="replyIndicator" style="display:none;padding:8px 12px;background:#0d1a35;border-left:3px solid #00a8ff;border-radius:0 4px 4px 0;margin-bottom:8px;font-size:12px;color:#00a8ff;">
      Đang trả lời <span id="replyToName"></span> <span onclick="cancelReply()" style="margin-left:8px;cursor:pointer;color:#4a6a8a;">✕</span>
    </div>
    <div class="comment-form">
      <input type="text" id="commentName" placeholder="Tên của bạn" oninput="localStorage.setItem('gbs_name', this.value)" 
        style="width:100%;padding:10px 12px;background:#0a1628;border:1px solid #122a4a;border-radius:4px;color:#c8dce8;font-family:inherit;font-size:13px;margin-bottom:8px;outline:none;">
      <textarea id="commentText" placeholder="Viết bình luận..." rows="3"
        style="width:100%;padding:10px 12px;background:#0a1628;border:1px solid #122a4a;border-radius:4px;color:#c8dce8;font-family:inherit;font-size:13px;resize:vertical;outline:none;"></textarea>
      <button onclick="postComment()" 
        style="margin-top:8px;padding:10px 20px;background:#00a8ff;border:none;border-radius:4px;color:#fff;font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;">Gửi</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-app.js";
  import { getFirestore, collection, addDoc, query, where, onSnapshot, serverTimestamp, doc, setDoc, runTransaction } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyC1mFu5jwgmszDa7bKCaj89BAECxW-6HEQ",
    authDomain: "great-blue-shark.firebaseapp.com",
    projectId: "great-blue-shark",
    storageBucket: "great-blue-shark.firebasestorage.app",
    messagingSenderId: "848130301351",
    appId: "1:848130301351:web:4c063bcd97a0f238e42a82",
    measurementId: "G-TTVKGE6G8C"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  window.firebaseDb = db;
  window.firebaseReady = true;

  // ── LOAD LIKES PER CHAPTER ──
  window.loadAllLikes = function() {
    const total = window.chapters ? window.chapters.length : 5;
    for (let i = 1; i <= total; i++) {
      const ref = doc(db, 'likes', 'chapter_' + i);
      onSnapshot(ref, (snap) => {
        const count = snap.exists() ? Math.max(0, snap.data().count) : 0;
        const el = document.getElementById('likes-ch-' + i);
        if (el) el.textContent = '♡ ' + count;
      });
    }
  }

  // ── LIKES ──
  window.likedChapters = JSON.parse(localStorage.getItem('gbs_likes') || '{}');
  window.likeBusy = false;

  window.toggleLike = async function() {
    if (window.likeBusy) return;
    window.likeBusy = true;
    const id = window.currentChapterForComments;
    const ref = doc(db, 'likes', 'chapter_' + id);
    const willLike = !window.likedChapters[id];
    try {
      await runTransaction(db, async (transaction) => {
        const snap = await transaction.get(ref);
        const current = snap.exists() ? snap.data().count : 0;
        const newCount = willLike ? current + 1 : Math.max(0, current - 1);
        transaction.set(ref, { count: newCount });
      });
      if (willLike) {
        window.likedChapters[id] = true;
      } else {
        delete window.likedChapters[id];
      }
      localStorage.setItem('gbs_likes', JSON.stringify(window.likedChapters));
      updateLikeButton(id);
    } catch(e) {
      console.error('Lỗi like:', e);
    }
    window.likeBusy = false;
  }

  window.updateLikeButton = function(chapterId) {
    const liked = window.likedChapters[chapterId];
    const icon = document.getElementById('likeIcon');
    const btn = document.getElementById('likeBtn');
    if (icon) icon.textContent = liked ? '♥' : '♡';
    if (btn) btn.style.borderColor = liked ? '#00a8ff' : '#122a4a';
    if (btn) btn.style.color = liked ? '#00a8ff' : '#5a7fa0';
  }

  window.loadLikes = function(chapterId) {
    const ref = doc(db, 'likes', 'chapter_' + chapterId);
    onSnapshot(ref, (snap) => {
      const count = snap.exists() ? snap.data().count : 0;
      const el = document.getElementById('likeCount');
      if (el) el.textContent = Math.max(0, count);
    });
    updateLikeButton(chapterId);
  }

  window.currentChapterForComments = 1;
  window.replyingTo = null; // { id, name }

  window.postComment = async function() {
    const name = document.getElementById('commentName').value.trim();
    const text = document.getElementById('commentText').value.trim();
    if (!name) { document.getElementById('commentName').style.borderColor = '#ff4060'; return; }
    document.getElementById('commentName').style.borderColor = '#122a4a';
    if (!text) return;
    try {
      const commentData = {
        chapter: window.currentChapterForComments,
        name: name,
        text: text,
        parentId: window.replyingTo ? window.replyingTo.id : null,
        timestamp: serverTimestamp()
      };
      await addDoc(collection(db, 'comments'), commentData);
      document.getElementById('commentText').value = '';
      cancelReply();
    } catch(e) {
      console.error('Lỗi gửi comment:', e);
    }
  }

  window.loadComments = function(chapterId) {
    window.currentChapterForComments = chapterId;
    const q = query(
      collection(db, 'comments'),
      where('chapter', '==', chapterId)
    );
    onSnapshot(q, (snapshot) => {
      const list = document.getElementById('commentsList');
      if (!list) return;
      list.innerHTML = '';
      if (snapshot.empty) {
        list.innerHTML = '<p style="color:#2a4a6a;font-size:13px;">Chưa có bình luận nào.</p>';
        return;
      }

      const all = [];
      snapshot.forEach((d) => { all.push({ id: d.id, ...d.data() }); });
      all.sort((a, b) => {
        const ta = a.timestamp ? a.timestamp.seconds : 0;
        const tb = b.timestamp ? b.timestamp.seconds : 0;
        return ta - tb;
      });

      // Tách comment gốc và replies
      const roots = all.filter(c => !c.parentId);
      const replies = all.filter(c => c.parentId);
      
      // Nhóm replies theo parentId
      const replyMap = {};
      replies.forEach(r => {
        if (!replyMap[r.parentId]) replyMap[r.parentId] = [];
        replyMap[r.parentId].push(r);
      });

      // Render comment gốc + replies bên dưới
      const rootIds = new Set(roots.map(r => r.id));
      roots.forEach((d) => {
        list.appendChild(buildCommentEl(d, false));
        const childReplies = replyMap[d.id] || [];
        childReplies.forEach((r) => {
          list.appendChild(buildCommentEl(r, true));
        });
      });

      // Orphan replies (parent đã bị xóa hoặc comment cũ không có parent hợp lệ)
      replies.forEach((r) => {
        if (!rootIds.has(r.parentId)) {
          list.appendChild(buildCommentEl(r, false));
        }
      });
    });
  }

  function buildCommentEl(d, isReply) {
    const time = d.timestamp ? new Date(d.timestamp.seconds * 1000).toLocaleDateString('vi-VN') : '';
    const safeId = d.id.replace(/'/g, "\\'");
    const safeName = d.name.replace(/'/g, "\\'").replace(/</g, '&lt;').replace(/>/g, '&gt;');
    const safeText = d.text.replace(/</g, '&lt;').replace(/>/g, '&gt;');
    const displayName = d.name.replace(/</g, '&lt;').replace(/>/g, '&gt;');

    const div = document.createElement('div');
    div.style.cssText = isReply
      ? 'padding:10px 12px;background:#0a1225;border-radius:4px;margin-bottom:4px;margin-left:24px;border-left:2px solid #0d1a35;'
      : 'padding:12px;background:#081420;border-radius:4px;margin-bottom:4px;';

    div.innerHTML = ''
      + '<div style="display:flex;justify-content:space-between;margin-bottom:4px;">'
      +   '<span style="font-size:12px;font-weight:600;color:#00a8ff;">' + displayName + '</span>'
      +   '<div style="display:flex;align-items:center;gap:8px;">'
      +     '<span style="font-size:11px;color:#2a4a6a;">' + time + '</span>'
      +     '<span onclick="deleteComment(\'' + safeId + '\')" style="font-size:11px;color:#1a3a5a;cursor:pointer;">✕</span>'
      +   '</div>'
      + '</div>'
      + '<p style="font-size:13px;color:#a0c0d8;line-height:1.5;margin:0;">' + safeText + '</p>'
      + (isReply ? '' : '<div style="margin-top:5px;"><span onclick="replyTo(\'' + safeId + '\', \'' + safeName + '\')" style="font-size:11px;color:#4a6a8a;cursor:pointer;">↩ Trả lời</span></div>');

    return div;
  }

  window.replyTo = function(commentId, name) {
    window.replyingTo = { id: commentId, name: name };
    document.getElementById('replyIndicator').style.display = 'block';
    document.getElementById('replyToName').textContent = name;
    document.getElementById('commentText').focus();
  }

  window.cancelReply = function() {
    window.replyingTo = null;
    document.getElementById('replyIndicator').style.display = 'none';
  }

  window.deleteComment = async function(commentId) {
    const pw = prompt('Mật khẩu admin:');
    if (pw !== 'makocain') return;
    try {
      const { deleteDoc } = await import("https://www.gstatic.com/firebasejs/11.4.0/firebase-firestore.js");
      await deleteDoc(doc(db, 'comments', commentId));
    } catch(e) {
      console.error('Lỗi xóa comment:', e);
    }
  }
</script>

<script>
  // ── DATA (loaded from Firestore) ──
  let chapters = [];
  let chaptersLoaded = false;

  async function loadChaptersFromFirestore() {
    try {
      // Wait for Firebase to be ready
      while (!window.firebaseDb) {
        await new Promise(r => setTimeout(r, 100));
      }
      const { collection, getDocs, query, orderBy } = await import("https://www.gstatic.com/firebasejs/11.4.0/firebase-firestore.js");
      const q = query(collection(window.firebaseDb, 'chapters'), orderBy('order', 'asc'));
      const snapshot = await getDocs(q);
      chapters = [];
      let idx = 1;
      snapshot.forEach((d) => {
        const data = d.data();
        chapters.push({
          id: idx,
          firestoreId: d.id,
          title: data.title || ('GBS#' + String(idx).padStart(3, '0')),
          thumbnail: data.thumbnail || null,
          description: data.description || null,
          images: data.images || []
        });
        idx++;
      });
      chaptersLoaded = true;
      window.chapters = chapters;
      renderChapters();
      updateContinueReading();
      if (window.loadAllLikes) window.loadAllLikes();

      // Auto-open from shared link
      const urlParams = new URLSearchParams(window.location.search);
      const sharedCh = parseInt(urlParams.get('ch'));
      if (sharedCh && sharedCh >= 1 && sharedCh <= chapters.length) {
        openReader(sharedCh);
      }
    } catch(e) {
      console.error('Lỗi tải chapters:', e);
      // Fallback: show message
      document.getElementById('chapterList').innerHTML = '<li style="padding:20px;text-align:center;color:#4a6a8a;font-size:13px;">Không tải được danh sách chương.</li>';
    }
  }

  let sortAsc = true;
  let currentChapter = 0;

  // ── READ HISTORY ──
  function getReadHistory() {
    return JSON.parse(localStorage.getItem('gbs_read') || '{}');
  }

  function markAsRead(id) {
    const history = getReadHistory();
    history[id] = true;
    localStorage.setItem('gbs_read', JSON.stringify(history));
  }

  // ── RENDER CHAPTERS ──
  function renderChapters(filter) {
    const list = document.getElementById('chapterList');
    const history = getReadHistory();
    let sorted = sortAsc ? [...chapters] : [...chapters].reverse();
    if (filter) {
      const q = filter.toLowerCase();
      sorted = sorted.filter(ch => ch.title.toLowerCase().includes(q) || String(ch.id).includes(q));
    }
    document.getElementById('chapCount').textContent = sorted.length + ' episodes';
    list.innerHTML = sorted.map(ch => {
      const isRead = history[ch.id];
      return `
      <a class="chapter-item${isRead ? ' read' : ''}" onclick="openReader(${ch.id})">
        <div class="chap-thumb">
          <img src="${ch.thumbnail || 'thumb.png'}" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:4px;" loading="lazy">
        </div>
        <div class="chap-info">
          <div class="chap-title">
            GBS#${String(ch.id).padStart(3,'0')}
          </div>
          ${ch.description ? `<div class="chap-desc">${ch.description.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>` : ''}
          <div class="chap-meta">
            <span id="likes-ch-${ch.id}">♡ 0</span>
          </div>
        </div>
      </a>`;
    }).join('');
  }

  // ── SEARCH ──
  function searchChapters() {
    const q = document.getElementById('searchInput').value.trim();
    renderChapters(q || null);
    if (window.loadAllLikes) window.loadAllLikes();
  }

  // ── SORT ──
  function toggleSort() {
    sortAsc = !sortAsc;
    const q = document.getElementById('searchInput').value.trim();
    renderChapters(q || null);
    if (window.loadAllLikes) window.loadAllLikes();
  }

  // ── BOOKMARK ──
  let bookmarkTimer = null;

  function getBookmarks() {
    return JSON.parse(localStorage.getItem('gbs_bookmarks') || '{}');
  }

  function saveBookmark() {
    if (!currentChapter) return;
    const content = document.getElementById('readerContent');
    if (!content) return;
    const images = content.querySelectorAll('img');
    if (images.length === 0) return;

    // Tìm ảnh đang hiện trên màn hình
    let visibleIdx = 0;
    const viewportMid = window.innerHeight / 3;
    for (let i = 0; i < images.length; i++) {
      const rect = images[i].getBoundingClientRect();
      if (rect.top <= viewportMid && rect.bottom > 0) {
        visibleIdx = i;
      }
    }

    const bookmarks = getBookmarks();
    // Nếu đang ở ảnh cuối hoặc đầu → xóa bookmark (đọc xong hoặc mới mở)
    if (visibleIdx >= images.length - 1 || visibleIdx === 0) {
      delete bookmarks[currentChapter];
    } else {
      bookmarks[currentChapter] = { imageIdx: visibleIdx };
    }
    localStorage.setItem('gbs_bookmarks', JSON.stringify(bookmarks));
  }

  function restoreBookmark(chapterId) {
    const bookmarks = getBookmarks();
    const bm = bookmarks[chapterId];
    if (!bm) return;

    const content = document.getElementById('readerContent');
    const images = content.querySelectorAll('img');
    if (images.length === 0 || bm.imageIdx === 0) return;

    const targetImg = images[Math.min(bm.imageIdx, images.length - 1)];
    
    // Đợi ảnh load xong rồi mới scroll
    let loaded = 0;
    const totalToWait = Math.min(bm.imageIdx + 1, images.length);
    
    function tryScroll() {
      targetImg.scrollIntoView({ behavior: 'instant' });
    }

    for (let i = 0; i < totalToWait; i++) {
      if (images[i].complete) {
        loaded++;
        if (loaded >= totalToWait) tryScroll();
      } else {
        images[i].addEventListener('load', () => {
          loaded++;
          if (loaded >= totalToWait) tryScroll();
        }, { once: true });
      }
    }

    // Fallback nếu ảnh load quá lâu
    setTimeout(tryScroll, 2000);
  }

  function startBookmarkTracking() {
    window.addEventListener('scroll', () => {
      if (!document.getElementById('readerView').classList.contains('active')) return;
      clearTimeout(bookmarkTimer);
      bookmarkTimer = setTimeout(saveBookmark, 500);
    });
  }

  startBookmarkTracking();

  // ── READER ──
  function openReader(id) {
    currentChapter = id;
    markAsRead(id);
    document.getElementById('mainView').classList.add('hidden');
    document.getElementById('readerView').classList.add('active');
    document.getElementById('readerTitle').textContent = `GBS#${String(id).padStart(3,'0')}`;
    const ch = chapters.find(c => c.id === id);
    const content = document.getElementById('readerContent');
    if (ch && ch.images && ch.images.length > 0) {
      content.innerHTML = ch.images.map(img => `<img src="${img}" alt="" style="width:100%;display:block;" loading="lazy">`).join('');
      // Restore bookmark
      restoreBookmark(id);
    } else {
      content.innerHTML = '<div class="reader-placeholder">Ảnh chapter sẽ hiển thị ở đây.<br>Cuộn xuống để đọc.</div>';
      window.scrollTo(0, 0);
    }
    updateReaderNav();
    if (window.loadComments) window.loadComments(id);
    if (window.loadLikes) window.loadLikes(id);
    const savedName = localStorage.getItem('gbs_name');
    if (savedName) document.getElementById('commentName').value = savedName;
  }

  function closeReader() {
    saveBookmark();
    document.getElementById('mainView').classList.remove('hidden');
    document.getElementById('readerView').classList.remove('active');
    renderChapters();
    if (window.loadAllLikes) window.loadAllLikes();
    updateContinueReading();
  }

  function prevChapter() {
    saveBookmark();
    if (currentChapter > 1) openReader(currentChapter - 1);
  }

  function nextChapter() {
    saveBookmark();
    if (currentChapter < chapters.length) openReader(currentChapter + 1);
  }

  function updateReaderNav() {
    document.getElementById('prevBtn').disabled = currentChapter <= 1;
    document.getElementById('nextBtn').disabled = currentChapter >= chapters.length;
  }

  function shareChapter() {
    const url = window.location.origin + window.location.pathname + '?ch=' + currentChapter;
    navigator.clipboard.writeText(url).then(() => {
      const msg = document.getElementById('shareMsg');
      msg.style.display = 'inline';
      setTimeout(() => { msg.style.display = 'none'; }, 2000);
    }).catch(() => {
      prompt('Copy link:', url);
    });
  }

  function updateContinueReading() {
    const history = getReadHistory();
    const validIds = chapters.map(c => c.id);
    const readIds = Object.keys(history).map(Number).filter(id => validIds.includes(id)).sort((a, b) => a - b);
    const container = document.getElementById('continueReading');
    if (!container) return;

    if (readIds.length === 0) {
      if (chapters.length > 0) {
        container.style.display = 'block';
        container.innerHTML = '<button onclick="openReader(1)" style="width:100%;padding:12px;background:#00a8ff;border:none;border-radius:4px;color:#fff;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;">▶ Bắt đầu đọc</button>';
      } else {
        container.style.display = 'none';
      }
    } else {
      const lastRead = Math.max(...readIds);
      const nextCh = lastRead < chapters.length ? lastRead + 1 : lastRead;
      const isNext = lastRead < chapters.length;
      const label = isNext ? 'Đọc tiếp GBS#' + String(nextCh).padStart(3, '0') : 'Đọc lại GBS#' + String(nextCh).padStart(3, '0');
      container.style.display = 'block';
      container.innerHTML = '<button onclick="openReader(' + nextCh + ')" style="width:100%;padding:12px;background:#00a8ff;border:none;border-radius:4px;color:#fff;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;">▶ ' + label + '</button>';
    }
  }

  // ── INIT ──
  renderChapters(); // render empty first
  loadChaptersFromFirestore(); // then load from Firestore

  function tryLoadFirebase() {
    if (window.loadAllLikes) {
      window.loadAllLikes();
    } else {
      setTimeout(tryLoadFirebase, 500);
    }
  }
  tryLoadFirebase();

  // Auto-open handled in loadChaptersFromFirestore
</script>
</body>
</html>
